const CORPUS=`SXSW 2026 — 20 sesiones — La Victoria Lab

1. CRAFT STILL WINS: THE IRREPLACEABLE ROLE OF HUMAN INSTINCT, TASTE, AND EMOTION
Greg Greenberg, Executive Creative Director, TBWA\\Media Arts Lab (agencia global de Apple)
El craft creativo que impacta a nivel humano requiere el craft humano. El instinto, el gusto y la inteligencia emocional son irreemplazables. En un mundo infatuado con la velocidad de la IA, no podemos perder de vista lo que verdaderamente impacta emocionalmente. El craft es la prueba de que alguien detrás de escena se importó.

2. F*** PRODUCTIVITY: MAKE SPACE FOR CREATIVE JOY
Stephanie Mencarelli, VP of Design, Adobe
La productividad constante está matando la creatividad. Es momento de hacer espacio para la alegría creativa. La neurociencia respalda que el descanso y el juego son combustibles de las mejores ideas.

3. TECHNOLOGIES OF CARE: RITUAL, PLAY & THE FUTURE OF WELLNESS
Sarah Ticho (Hatsumi / XR Health Alliance) + Niki Smit (Monobanda)
Las experiencias inmersivas lideradas por artistas y respaldadas por la ciencia fomentan la expresión emocional y el bienestar. El cuidado se diseña a través de rituales creativos. Arte, salud y educación son una sola cosa cuando se diseña desde la intención.

4. BREAKING THROUGH BARRIERS TO INNOVATION: LESSONS FROM SPACE AND EARTH
Cady Coleman (Astronaut) + Dava Newman (MIT Apollo Professor, ex-NASA deputy administrator)
Mantra de Dava Newman: Love, Act, Discover, Innovate. La innovación requiere coraje para considerar cómo el cambio puede transformar la manera en que nos relacionamos entre nosotros y con el planeta.

5. UNLOCKING THE POWER OF COMMUNITY IN THE POST-SOCIAL ERA
Sara Wilson, Founder & Principal, SW Projects
Las audiencias se retiran a espacios digitales privados — digital campfires. Priorizar relevancia sobre alcance. La lealtad viene de comunidades orgánicas reales.

6. HUMAN-CENTERED STORYTELLING: CREATE CONNECTION & COMMUNITY
Cheryl Miller Houser, Founder, Creative Breed
Las marcas y líderes más exitosos cuentan historias que mueven profundamente y crean comunidad. Las historias no son envoltorio — son el alimento mismo.

7. KEYNOTE: NATURE SPEAKS. CAN AI HELP US LISTEN?
Aza Raskin, Co-Founder, Earth Species Project
Más de 8 millones de especies comparten el planeta. Solo hemos entendido el lenguaje de una. La IA decodifica lenguajes de otras especies. We don't change when we speak. We change when we listen.

8. RESTORATIVE BY DESIGN: REIMAGINING WELLBEING FOR OUR CITIES
Leyli Zohrenejad (Crosby Capital) + Robert Hammond (Therme US) + Robbie Bent (Othership)
El verdadero bienestar no viene de la auto-optimización sino del cuidado colectivo. El bienestar es infraestructura pública, no commodity privado.

9. THE PAST IS PROLOGUE: HOW DO WE MAKE FOR TODAY'S AUDIENCES?
Ayanna Thompson (ASU) + Hayley Pepler + Akhila Krishnan (Royal Shakespeare Company) + Lisa Jamhoury (loss·y)
Las audiencias buscan storytelling innovador. El cuerpo es el primer medio. No hay que usar la última tecnología solo porque existe.

10. INSPIRED BY RESEARCH. NOT RUINED BY IT.
Sofia Colucci (CMO, Molson Coors) + Joe Burns (Quality Meats Creative) + Andy Cooper (One Minute To Midnight)
Los unknown unknowns son el territorio más fértil. La investigación no amenaza la creatividad — es catalizador.

11. WEIRD FTW: WHAT HAPPENS WHEN BRANDS ZIG WHILE OTHERS ZAG
Andy Pearson (Liquid Death) + Andrew Benin (Graza) + Noah Simon-Waddell (The Coconut Cult) + Jen Zeszut (Goodles)
Las marcas scrappy ganan abrazando lo raro. Ser raro no es una estrategia — es un acto de fe. Lo que se siente auténtico no se diseña: se es.

12. NEUROAESTHETICS IN THE FUTURE OF DESIGN
Anne Palmer DMA (Johns Hopkins IAM Lab) + Freya Salway (Google Arts & Culture) + Lachlan Turczan + Robyn Landau (Kinda Studios)
La neuroestética es la ciencia de cómo el arte, el diseño, la cultura y la tecnología moldean el cerebro y el cuerpo. Diseñar para JOY es diseñar para la salud.

13. AMY WEBB LAUNCHES 2026 EMERGING TECH TREND REPORT
Amy Webb, Futurist
Tres tormentas convergentes: Human Augmentation, Unlimited Labor, Emotional Outsourcing (la soledad como mercado). La IA no tiene centro humano — hay que especializarse en conexión, empatía, abrazos.

14. SHAPING BRAND RELEVANCE FOR A NEW GENERATION
Tasia Filippatos, President Disney Consumer Products, The Walt Disney Company
La relevancia significa conexión significativa. Siempre empezar con la emoción: ¿Qué queremos que la gente sienta? La emoción convierte un momento en una memoria.

15. BRENÉ BROWN & ADAM GRANT LIVE
Brené Brown + Adam Grant
El liderazgo más poderoso viene de la vulnerabilidad. Las mejores organizaciones crean culturas donde la gente puede ser vista y puede importar.

16. HOW AI SYSTEMS WILL MAKE BRANDS MORE HUMAN
Suzana Apelbaum (Google Media Lab) + Paul Aann (Addition)
La IA hace posible que todos creen. Las marcas son símbolos de pertenencia. Creative campaigns → Intelligent Systems.

17. DON'T BE CRINGE: HOW TO ACTUALLY WIN GEN Z & ALPHA
Gen Z y Alpha no tienen atención corta — tienen detectores de mentira muy afinados. Necesitas gente que CREE trends, no que los siga.

18. WE'RE ON THE CUSP OF COMMUNICATING WITH WHALES (THE STORY OF STORIES)
Las historias crean revolución. Los algoritmos de refuerzo optimizan para el click y crean polarización. La emoción llega primero.

19. HOW DEATH BECAME THE NEW WELLNESS FRONTIER
Rebecca Feinglos (Grieve Leave) + Darnell Lamont Walker + Jamie Thrower (Queer Grief Club)
No estamos hechos para llorar solos. El duelo es un ancla interior para verificar prioridades. Planear es un acto de amor.

20. KEYNOTE: A CONVERSATION WITH JENNIFER B. WALLACE (MATTERING)
Jennifer B. Wallace, The Mattering Institute
Mattering = nos sentimos valorados + sabemos que añadimos valor al mundo. ¿Cómo aseguramos que la gente sepa que importa? El antídoto a la cultura del logro tóxico es el propósito, la conexión y el sentido de contribuir.`;

const LVL=`La Victoria Lab — Secret Sauce: We make meaningful shit happen · We make empathy our mantra · We are humble and daring · We nurture diversity · We are certain about uncertainty · We make it fun. Misión: acelerar el bienestar de las familias latinoamericanas a través del diseño. Proyectos 2026: Piloto UTP, Chachikart, LVL OS, FEST_26, Ecosystem Vision, Doctor Amigo/Aviva, Leaders Journey, Peruvian Families Framework, Learning Trip China.`;

const CARGAS=['LOS VELOS SE ESTÁN CORRIENDO...','LA SEÑORA CONSULTA LAS 20 SESIONES...','LOS INSIGHTS EMERGEN DE LA NIEBLA...','TEJIENDO LOS SABERES DE SXSW...','LA SEÑORA RECONOCE TU NOMBRE...'];

let modo='q',signo=null;

function getProf(n){if(!n)return null;const nl=n.toLowerCase().trim();if(TEAM[nl])return TEAM[nl];for(const k of Object.keys(TEAM))if(nl.includes(k)||k.includes(nl))return TEAM[k];return null;}
function isProy(q){if(!q)return false;return['utp','chachikart','lvl os','bless','aviva','doctor amigo','leaders journey','peruvian families','learning trip','ecosystem vision','fest'].some(k=>q.toLowerCase().includes(k));}

function buildZodiac(){
  const g=document.getElementById('zgrid');
  SIGNOS.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='zs';b.dataset.c=s.c;
    b.textContent=s.sym+' '+s.n;
    b.onclick=()=>{signo=i;document.querySelectorAll('.zs').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');document.getElementById('zsel').textContent=s.sym+' '+s.n+' · '+s.el.toUpperCase();};
    g.appendChild(b);
  });
}

function setMode(m){
  modo=m;
  document.getElementById('bq').classList.toggle('on',m==='q');
  document.getElementById('br').classList.toggle('on',m==='r');
  document.getElementById('qmode').style.display=m==='q'?'block':'none';
  document.getElementById('rmode').classList.toggle('vis',m==='r');
  reset();
}

function getName(){return(document.getElementById('name-q').value||document.getElementById('name-r').value||'').trim();}

function buildPrompt(q,name,prof,sn,sel,esP){
  const pCtx=prof?`La persona se llama ${prof.f}. Dato personal: ${prof.p}`:(name?`La persona se llama ${name}.`:'Consulta anónima.');
  const sCtx=sn?`Signo: ${sn}, elemento ${sel}.`:'Sin signo.';
  const qCtx=q?`Su pregunta: "${q}"`:'Revelación aleatoria. Elige el insight más sorprendente.';
  const pC=esP?'Menciona un proyecto de LVL. Incluye lvl_layer relevante.':'No menciona proyectos. lvl_layer = null.';
  return `Eres la Señora de la Incertidumbre — oráculo de diseño que canaliza insights de SXSW 2026 para La Victoria Lab.

CORPUS SXSW 2026:
${CORPUS}

VALORES LVL:
${LVL}

PERSONA: ${pCtx} ${sCtx}
CONSULTA: ${qCtx} ${pC}

Responde SOLO con JSON válido, sin texto extra, sin backticks:
{"tema":"frase corta máx 6 palabras en MAYÚSCULAS","mensaje":"3-5 oraciones. Voz oracular, poética pero concreta. Combina creativamente insights de VARIAS sesiones de SXSW. Sin comillas tipográficas. Sin clichés motivacionales.","fuente":"Speakers y títulos de sesiones SXSW 2026 que inspiraron este mensaje","provocacion":"Pregunta incómoda y específica de vuelta. Máx 2 oraciones.","signo_mensaje":${sn?`"1-2 oraciones específicas para ${sn} (${sel})"`:"null"},"personal_layer":${prof?`"1-2 oraciones que integren el dato personal sobre ${prof.f} con el tema. Úsalo como punto de partida."`:"null"},"lvl_layer":${esP?`"1-2 oraciones conectando con el proyecto LVL mencionado"`:"null"}}`;
}

async function callProxy(prompt){
  const r=await fetch('/api/oracle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return await r.json();
}

function render(res,esP,prof){
  const name=getName(),dn=prof?prof.f:name||null;
  const g=document.getElementById('rgreeting');
  if(dn){g.textContent='★ LA SEÑORA TE HABLA, '+dn.toUpperCase()+' ★';g.style.display='block';}else g.style.display='none';
  document.getElementById('rtag').textContent=res.tema||'';
  document.getElementById('rtext').textContent=res.mensaje||'';
  document.getElementById('rsrc').textContent=res.fuente||'';
  const rp=document.getElementById('rpersonal');
  if(res.personal_layer&&res.personal_layer!=='null'){document.getElementById('rpersonal-txt').textContent=res.personal_layer;rp.style.display='block';}else rp.style.display='none';
  const rl=document.getElementById('rlvl');
  if(esP&&res.lvl_layer&&res.lvl_layer!=='null'){document.getElementById('rlvl-txt').textContent=res.lvl_layer;rl.style.display='block';}else rl.style.display='none';
  const rz=document.getElementById('rzodiac');
  if(signo!==null&&res.signo_mensaje&&res.signo_mensaje!=='null'){document.getElementById('rzodiac-lbl').textContent=SIGNOS[signo].sym+' '+SIGNOS[signo].n+' dice';document.getElementById('rzodiac-txt').textContent=res.signo_mensaje;rz.style.display='block';}else rz.style.display='none';
  const rv=document.getElementById('rprov');
  if(res.provocacion){document.getElementById('rprov-txt').textContent=res.provocacion;rv.style.display='block';}else rv.style.display='none';
  document.getElementById('loading').classList.remove('vis');
  document.getElementById('errmsg').style.display='none';
  document.getElementById('resp-stripe').style.display='block';
  document.getElementById('resp').classList.add('vis');
}

function startLoad(){
  document.getElementById('resp').classList.remove('vis');
  document.getElementById('resp-stripe').style.display='none';
  document.getElementById('errmsg').style.display='none';
  document.getElementById('loading').classList.add('vis');
  let i=0;const lt=document.getElementById('ltxt');
  return setInterval(()=>{lt.textContent=CARGAS[i++%CARGAS.length];},900);
}

function showError(msg){
  document.getElementById('loading').classList.remove('vis');
  const e=document.getElementById('errmsg');e.textContent=msg;e.style.display='block';
}

async function consultar(){
  const q=document.getElementById('q-in').value.trim(),name=getName(),prof=getProf(name);
  const sn=signo!==null?SIGNOS[signo].n:null,sel=signo!==null?SIGNOS[signo].el:null,esP=isProy(q);
  const iv=startLoad();
  try{const res=await callProxy(buildPrompt(q,name,prof,sn,sel,esP));clearInterval(iv);render(res,esP,prof);}
  catch(e){clearInterval(iv);showError('LA SEÑORA ESTÁ EN OTRO PLANO. INTENTA DE NUEVO.');}
}

async function revelar(){
  const name=getName(),prof=getProf(name);
  const sn=signo!==null?SIGNOS[signo].n:null,sel=signo!==null?SIGNOS[signo].el:null;
  const iv=startLoad();
  try{const res=await callProxy(buildPrompt('',name,prof,sn,sel,false));clearInterval(iv);render(res,false,prof);}
  catch(e){clearInterval(iv);showError('LA SEÑORA ESTÁ EN OTRO PLANO. INTENTA DE NUEVO.');}
}

function reset(){
  document.getElementById('resp').classList.remove('vis');
  document.getElementById('loading').classList.remove('vis');
  document.getElementById('resp-stripe').style.display='none';
  document.getElementById('errmsg').style.display='none';
  const qi=document.getElementById('q-in');if(qi)qi.value='';
}

buildZodiac();
setMode('q');
</script>
